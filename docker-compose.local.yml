# ==============================================================================
# FLEETINTEL MCP - DOCKER COMPOSE LOCAL DEVELOPMENT
# ==============================================================================
#
# SERVICOS:
# - postgres: Banco FleetIntel (porta 5432)
# - redis: Cache (porta 6379)
# - redis-commander: UI Redis debug (porta 8081, opcional)
#
# USO:
# docker compose -f docker-compose.local.yml up -d
# docker compose -f docker-compose.local.yml down
#
# VARIAVEIS REQUERIDAS NO .env:
# FLEETINTEL_DB_PASSWORD=senha-segura-aqui
#
# ==============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetintel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleetintel
      POSTGRES_USER: fleetintel
      POSTGRES_PASSWORD: ${FLEETINTEL_DB_PASSWORD:-fleetintel_dev}
    volumes:
      - fleetintel-pgdata:/var/lib/postgresql/data
      - ./scripts/setup_database.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - fleetintel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetintel -d fleetintel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.fleetintel.project: "fleetintel-mcp"
      com.fleetintel.environment: "development"

  redis:
    image: redis:7-alpine
    container_name: fleetintel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fleetintel-network
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.fleetintel.project: "fleetintel-mcp"
      com.fleetintel.environment: "development"

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fleetintel-redis-ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:fleetintel-redis:6379
    networks:
      - fleetintel-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    labels:
      com.fleetintel.project: "fleetintel-mcp"
      com.fleetintel.environment: "development"

networks:
  fleetintel-network:
    driver: bridge

volumes:
  fleetintel-pgdata:
    name: fleetintel-pgdata
    driver: local
  redis-data:
    driver: local
